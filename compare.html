<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國考方劑整合對照表（全120方）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#0f0e0c;--surface:#1a1814;--surface2:#221f1a;--surface3:#2a2620;
  --border:#2e2a24;--border2:#3d3830;
  --text:#e8dfc8;--muted:#7a7060;--muted2:#9a8e78;
  --gold:#c9a84c;--gold2:#e8c870;--golddim:rgba(201,168,76,0.12);
  --red:#c45c3a;--red2:#e07050;
  --blue:#4a7fa8;--blue2:#6aafd8;
  --green:#4a8a5a;--green2:#6ab87a;
  --purple:#7a5ca8;--purple2:#b09ae8;
  --teal:#3a8a88;--teal2:#6ac8c6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{
  background:linear-gradient(135deg,#1c1710 0%,#0f0e0c 60%);
  border-bottom:1px solid var(--border);
  padding:1.6rem 2rem 1.2rem;
  position:relative;overflow:hidden;
}
header::before{
  content:'方';
  font-family:'Noto Serif TC',serif;font-size:14rem;font-weight:900;
  color:rgba(201,168,76,0.03);
  position:absolute;right:-1rem;top:-3rem;line-height:1;pointer-events:none;
}
.h-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:0.8rem;}
.h-title{font-family:'Noto Serif TC',serif;font-size:1.45rem;font-weight:700;color:var(--gold2);letter-spacing:0.06em;}
.h-sub{font-size:0.7rem;color:var(--muted);margin-top:0.2rem;letter-spacing:0.08em;}
.h-count{display:flex;gap:0.6rem;align-items:center;}
.hbadge{
  padding:0.3rem 0.75rem;border-radius:4px;font-size:0.68rem;letter-spacing:0.05em;font-weight:500;
  background:var(--golddim);border:1px solid rgba(201,168,76,0.3);color:var(--gold2);
}

/* NAV */
nav{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--surface);padding:0 1.5rem;overflow-x:auto;
}
nav button{
  padding:0.65rem 1.1rem;border:none;background:none;
  font-family:'Noto Sans TC',sans-serif;font-size:0.76rem;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:all 0.2s;letter-spacing:0.04em;
}
nav button:hover{color:var(--text);}
nav button.active{color:var(--gold2);border-bottom-color:var(--gold);}

/* MAIN */
.main{padding:1.4rem 1.8rem 3rem;max-width:1300px;margin:0 auto;}
.tab-panel{display:none;}.tab-panel.active{display:block;}

/* FILTER BAR */
.filter-bar{
  display:flex;gap:0.45rem;flex-wrap:wrap;
  margin-bottom:1rem;padding:0.85rem;
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
}
.filter-bar input{
  flex:1;min-width:180px;
  padding:0.4rem 0.75rem;border:1px solid var(--border2);border-radius:5px;
  font-family:'Noto Sans TC',sans-serif;font-size:0.78rem;
  background:var(--surface2);color:var(--text);outline:none;
}
.filter-bar input:focus{border-color:var(--gold);}
.fgroup{display:flex;gap:0.35rem;flex-wrap:wrap;align-items:center;}
.fgl{font-size:0.63rem;color:var(--muted);white-space:nowrap;margin-right:0.15rem;}
.fbtn{
  padding:0.32rem 0.65rem;border:1px solid var(--border2);border-radius:4px;
  background:var(--surface2);font-family:'Noto Sans TC',sans-serif;
  font-size:0.67rem;cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap;
}
.fbtn:hover{color:var(--text);border-color:var(--border2);}
.fbtn.on{background:var(--golddim);color:var(--gold2);border-color:rgba(201,168,76,0.4);}
.fbtn.on-g{background:rgba(74,138,90,0.12);color:var(--green2);border-color:rgba(74,138,90,0.35);}
.fbtn.on-b{background:rgba(74,127,168,0.12);color:var(--blue2);border-color:rgba(74,127,168,0.35);}
.fbtn.on-r{background:rgba(196,92,58,0.12);color:var(--red2);border-color:rgba(196,92,58,0.35);}
.fbtn.on-p{background:rgba(122,92,168,0.12);color:var(--purple2);border-color:rgba(122,92,168,0.35);}

/* RESULT COUNT */
.rcount{font-size:0.68rem;color:var(--muted);margin-bottom:0.7rem;padding-left:0.2rem;}
.rcount span{color:var(--gold2);font-weight:500;}

/* CARD GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0.75rem;}
.fcard2{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;
  transition:border-color 0.2s,transform 0.15s;
}
.fcard2:hover{transform:translateY(-2px);border-color:var(--border2);}
.fcard2.s-mastered{border-color:rgba(74,138,90,0.45);}
.fcard2.s-reviewing{border-color:rgba(201,168,76,0.45);}
.fcard2.s-unfamiliar{border-color:rgba(196,92,58,0.45);}

.card-head{
  padding:0.55rem 0.9rem;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(201,168,76,0.04),transparent);
}
.card-name{font-family:'Noto Serif TC',serif;font-size:0.95rem;font-weight:600;color:var(--text);}
.card-meta{display:flex;gap:0.4rem;align-items:center;}
.tag-cat{
  font-size:0.6rem;padding:0.1rem 0.42rem;border-radius:3px;
  background:rgba(74,127,168,0.12);color:var(--blue2);border:1px solid rgba(74,127,168,0.2);
}
.tag-ex{
  font-size:0.6rem;padding:0.1rem 0.3rem;border-radius:3px;
  font-weight:500;
}
.tag-ex.e1{background:rgba(201,168,76,0.12);color:var(--gold2);}
.tag-ex.e2{background:rgba(74,138,90,0.12);color:var(--green2);}
.tag-ex.e3{background:rgba(122,92,168,0.12);color:var(--purple2);}

.card-body{padding:0.6rem 0.9rem;display:flex;flex-direction:column;gap:0.38rem;}
.row-label{font-size:0.58rem;color:var(--border2);letter-spacing:0.1em;margin-bottom:0.1rem;}
.row-val{font-size:0.74rem;color:var(--muted2);line-height:1.55;}
.row-val.effect{color:var(--teal2);}
.row-val.pattern{color:var(--text);font-weight:400;}
.row-val.mnem{color:var(--blue2);}
.row-val.herbs{color:var(--muted);font-size:0.7rem;}
.herbs-hidden{display:none;}

.card-actions{
  display:flex;gap:0.35rem;padding:0.42rem 0.9rem;
  border-top:1px solid var(--border);
}
.abtn{
  flex:1;padding:0.28rem;border:1px solid var(--border);border-radius:4px;
  font-family:'Noto Sans TC',sans-serif;font-size:0.6rem;cursor:pointer;
  background:none;color:var(--muted);transition:all 0.15s;
}
.abtn:hover{background:var(--surface2);color:var(--text);}
.abtn.a-u{background:rgba(196,92,58,0.1);border-color:rgba(196,92,58,0.3);color:var(--red2);}
.abtn.a-r{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold2);}
.abtn.a-m{background:rgba(74,138,90,0.1);border-color:rgba(74,138,90,0.3);color:var(--green2);}

/* FLASHCARD TAB */
.fc-opts{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;align-items:center;}
.fc-opts span{font-size:0.7rem;color:var(--muted);}
.fcm{
  padding:0.35rem 0.85rem;border:1px solid var(--border2);border-radius:20px;
  font-family:'Noto Sans TC',sans-serif;font-size:0.7rem;
  cursor:pointer;background:var(--surface);color:var(--muted);transition:all 0.15s;
}
.fcm:hover{color:var(--text);}
.fcm.active{background:var(--golddim);color:var(--gold2);border-color:rgba(201,168,76,0.4);}

.fc-range{
  display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem;
  padding-top:0.6rem;border-top:1px solid var(--border);align-items:center;
}
.fc-range span{font-size:0.7rem;color:var(--muted);}

.fc-wrap{display:flex;justify-content:center;margin-bottom:1rem;}
.flip-card{
  width:100%;max-width:520px;min-height:280px;
  background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;
  padding:2.4rem 2rem;text-align:center;cursor:pointer;user-select:none;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:0.9rem;
  transition:box-shadow 0.2s,border-color 0.2s;
}
.flip-card:hover{box-shadow:0 6px 28px rgba(0,0,0,0.45);border-color:var(--border2);}
.fc-qlabel{font-size:0.6rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;}
.fc-question{font-family:'Noto Serif TC',serif;font-size:1.65rem;font-weight:700;color:var(--gold2);line-height:1.3;}
.fc-answer{font-size:0.84rem;color:var(--blue2);line-height:1.85;max-width:400px;}
.fc-effect{font-size:0.76rem;color:var(--teal2);line-height:1.7;max-width:400px;border-top:1px solid var(--border);padding-top:0.6rem;}
.fc-hint{font-size:0.6rem;color:var(--border2);}

.fc-nav{display:flex;justify-content:center;gap:0.7rem;align-items:center;margin-bottom:0.75rem;}
.fc-nav button{
  padding:0.42rem 1.2rem;border:1px solid var(--border2);border-radius:5px;
  background:var(--surface);font-family:'Noto Sans TC',sans-serif;
  font-size:0.74rem;cursor:pointer;color:var(--text);transition:all 0.15s;
}
.fc-nav button:hover{background:var(--surface2);}
.fc-cnt{font-size:0.74rem;color:var(--muted);min-width:55px;text-align:center;}

.mark-row{display:flex;gap:0.6rem;justify-content:center;}
.mbtn{
  padding:0.42rem 1rem;border-radius:5px;
  font-family:'Noto Sans TC',sans-serif;font-size:0.72rem;cursor:pointer;transition:all 0.15s;
}
.m-u{background:rgba(196,92,58,0.1);border:1px solid rgba(196,92,58,0.3);color:var(--red2);}
.m-r{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold2);}
.m-m{background:rgba(74,138,90,0.1);border:1px solid rgba(74,138,90,0.3);color:var(--green2);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.6rem;margin-bottom:1.2rem;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.8rem;text-align:center;}
.snum{font-family:'Noto Serif TC',serif;font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:0.2rem;}
.slbl{font-size:0.63rem;color:var(--muted);letter-spacing:0.05em;}
.prog-row{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.5rem;}
.prog-lbl{width:90px;font-size:0.72rem;color:var(--text);}
.prog-tr{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.8s ease;}
.prog-pct{width:38px;text-align:right;font-size:0.67rem;color:var(--muted);}

section{margin-bottom:2rem;}
section h2{
  font-family:'Noto Serif TC',serif;font-size:0.88rem;font-weight:600;
  color:var(--gold);margin-bottom:0.9rem;padding-bottom:0.4rem;
  border-bottom:1px solid var(--border2);letter-spacing:0.06em;
}
.tip{
  background:rgba(74,127,168,0.07);border-left:2px solid var(--blue);
  border-radius:0 5px 5px 0;padding:0.6rem 0.9rem;
  font-size:0.74rem;line-height:1.7;color:var(--muted2);margin-bottom:0.9rem;
}

@media(max-width:600px){
  .main{padding:0.9rem;}header{padding:1rem;}
  .cgrid{grid-template-columns:1fr;}
  .flip-card{padding:1.6rem 1.2rem;min-height:240px;}
  .fc-question{font-size:1.35rem;}
}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <div>
      <div class="h-title">國考方劑整合對照表</div>
      <div class="h-sub">功效 · 證型 · 藥材組成 · 記憶口訣　全整合複習</div>
    </div>
    <div class="h-count">
      <div class="hbadge" id="total-badge">共 — 方</div>
    </div>
  </div>
</header>
<nav>
  <button class="active" onclick="showTab('cards',this)">📖 對照卡片</button>
  <button onclick="showTab('flash',this)">⚡ 閃卡練習</button>
  <button onclick="showTab('stats',this)">📊 掌握統計</button>
</nav>
<div class="main">

<!-- CARDS TAB -->
<div id="tab-cards" class="tab-panel active">
  <div class="filter-bar">
    <input type="text" id="search" placeholder="搜尋方名、功效、證型、藥材…" oninput="render()">
    <div class="fgroup">
      <span class="fgl">範圍：</span>
      <button class="fbtn on" id="ex-all" onclick="setEx('all',this)">全部</button>
      <button class="fbtn" id="ex-e1" onclick="setEx('e1',this)">🟡 1–40</button>
      <button class="fbtn" id="ex-e2" onclick="setEx('e2',this)">🟢 41–80</button>
      <button class="fbtn" id="ex-e3" onclick="setEx('e3',this)">🟣 81–120</button>
    </div>
    <div class="fgroup">
      <span class="fgl">狀態：</span>
      <button class="fbtn on" id="st-all" onclick="setSt('all',this)">全部</button>
      <button class="fbtn" id="st-u" onclick="setSt('unfamiliar',this)">🔴 不熟</button>
      <button class="fbtn" id="st-r" onclick="setSt('reviewing',this)">🟡 複習中</button>
      <button class="fbtn" id="st-m" onclick="setSt('mastered',this)">🟢 已掌握</button>
    </div>
    <div class="fgroup">
      <button class="fbtn" id="herb-toggle" onclick="toggleHerbs()">顯示藥材</button>
    </div>
  </div>
  <div class="rcount" id="rcount"></div>
  <div class="cgrid" id="cgrid"></div>
</div>

<!-- FLASHCARD TAB -->
<div id="tab-flash" class="tab-panel">
  <div class="fc-opts">
    <span>出題模式：</span>
    <button class="fcm active" onclick="setFcMode('name2effect',this)">方名 → 功效＋證型</button>
    <button class="fcm" onclick="setFcMode('mnem2herb',this)">口訣 → 藥材</button>
    <button class="fcm" onclick="setFcMode('pattern2name',this)">證型 → 方名</button>
    <button class="fcm" onclick="setFcMode('weak',this)">🔴 弱點模式</button>
  </div>
  <div class="fc-range">
    <span>範圍：</span>
    <button class="fbtn on" onclick="setFcEx('all',this)">全部</button>
    <button class="fbtn" onclick="setFcEx('e1',this)">1–40</button>
    <button class="fbtn" onclick="setFcEx('e2',this)">41–80</button>
    <button class="fbtn" onclick="setFcEx('e3',this)">81–120</button>
  </div>
  <div class="fc-wrap">
    <div class="flip-card" id="flipcard" onclick="flip()">
      <div class="fc-qlabel" id="fc-qlabel">QUESTION</div>
      <div class="fc-question" id="fc-question">選擇範圍後按下一題</div>
      <div class="fc-answer" id="fc-answer" style="display:none"></div>
      <div class="fc-effect" id="fc-effect" style="display:none"></div>
      <div class="fc-hint" id="fc-hint">點擊翻牌 ▽</div>
    </div>
  </div>
  <div class="fc-nav">
    <button onclick="prevFc()">← 上一題</button>
    <span class="fc-cnt" id="fc-cnt">— / —</span>
    <button onclick="nextFc()">下一題 →</button>
  </div>
  <div class="mark-row">
    <button class="mbtn m-u" onclick="markFc('unfamiliar')">🔴 不熟</button>
    <button class="mbtn m-r" onclick="markFc('reviewing')">🟡 複習中</button>
    <button class="mbtn m-m" onclick="markFc('mastered')">🟢 已掌握</button>
  </div>
</div>

<!-- STATS TAB -->
<div id="tab-stats" class="tab-panel">
  <section>
    <h2>📊 整體掌握度</h2>
    <div class="stats-grid" id="stats-grid"></div>
  </section>
  <section>
    <h2>🎯 各批次進度</h2>
    <div id="prog-rows"></div>
  </section>
  <section>
    <h2>💡 使用提示</h2>
    <div class="tip">
      📖 <strong>對照卡片</strong>：搜尋功效關鍵字（如「清熱」「益氣」）快速定位相關方劑，點狀態按鈕標記複習進度。<br>
      ⚡ <strong>閃卡練習</strong>：建議先做「方名→功效＋證型」建立框架，再做「口訣→藥材」鞏固組成，考前用「弱點模式」集中攻弱。<br>
      📌 <strong>閃卡翻牌後</strong>：誠實標記狀態，🟢已掌握不會再出現在弱點模式，🔴不熟優先複習。
    </div>
  </section>
</div>

</div>
<script>
// ============================================================
//  DATA - 交集方劑（兩份都有的方名），含全部五欄
// ============================================================
const DATA=[

// ============================================================
//  STATE
// ============================================================
let status={};
let showHerbs=false;
let filterEx='all';
let filterSt='all';
let fcMode='name2effect';
let fcExam='all';
let fcQueue=[];
let fcIdx=0;
let fcFlipped=false;

try{const s=localStorage.getItem('fzh2');if(s)status=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('fzh2',JSON.stringify(status));}catch(e){}}

// Update header count
document.getElementById('total-badge').textContent=`共 ${DATA.length} 方`;

// ============================================================
//  TABS
// ============================================================
function showTab(n,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  btn.classList.add('active');
  if(n==='cards')render();
  if(n==='stats')renderStats();
  if(n==='flash')initFc();
}

// ============================================================
//  CARDS
// ============================================================
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=DATA.filter(d=>{
    const me=filterEx==='all'||d.ex===filterEx;
    const ms=filterSt==='all'||(status[d.id]||'none')===filterSt;
    const mq=!q||d.name.includes(q)||d.effect.includes(q)||d.pattern.includes(q)||d.herbs.includes(q)||d.mnem.includes(q)||d.cat.includes(q);
    return me&&ms&&mq;
  });
  document.getElementById('rcount').innerHTML=`顯示 <span>${filtered.length}</span> / ${DATA.length} 方`;
  document.getElementById('cgrid').innerHTML=filtered.map(d=>{
    const st=status[d.id]||'none';
    const exClass={e1:'e1',e2:'e2',e3:'e3'}[d.ex];
    const exLabel={e1:'1–40',e2:'41–80',e3:'81–120'}[d.ex];
    return`<div class="fcard2 ${st!=='none'?'s-'+st:''}">
      <div class="card-head">
        <div class="card-name">${d.name}</div>
        <div class="card-meta">
          <span class="tag-cat">${d.cat}</span>
          <span class="tag-ex ${exClass}">${exLabel}</span>
        </div>
      </div>
      <div class="card-body">
        <div>
          <div class="row-label">功效</div>
          <div class="row-val effect">${d.effect}</div>
        </div>
        <div>
          <div class="row-label">證型</div>
          <div class="row-val pattern">${d.pattern}</div>
        </div>
        <div>
          <div class="row-label">口訣</div>
          <div class="row-val mnem">${d.mnem}</div>
        </div>
        <div>
          <div class="row-label">藥材</div>
          <div class="row-val herbs ${showHerbs?'':'herbs-hidden'}">${d.herbs}</div>
          ${!showHerbs?'<div style="font-size:0.62rem;color:var(--border2)">按「顯示藥材」展開</div>':''}
        </div>
      </div>
      <div class="card-actions">
        <button class="abtn ${st==='unfamiliar'?'a-u':''}" onclick="setSt('${d.id}','unfamiliar',event)">🔴 不熟</button>
        <button class="abtn ${st==='reviewing'?'a-r':''}" onclick="setSt('${d.id}','reviewing',event)">🟡 複習中</button>
        <button class="abtn ${st==='mastered'?'a-m':''}" onclick="setSt('${d.id}','mastered',event)">🟢 已掌握</button>
      </div>
    </div>`;
  }).join('');
}

function setSt(id,st,e){
  e.stopPropagation();
  if(status[id]===st)delete status[id]; else status[id]=st;
  save();render();
}

function setEx(ex,btn){
  filterEx=ex;
  ['ex-all','ex-e1','ex-e2','ex-e3'].forEach(id=>{
    const b=document.getElementById(id);
    b.classList.remove('on','on-g','on-p');
  });
  if(ex==='all')btn.classList.add('on');
  else if(ex==='e1')btn.classList.add('on');
  else if(ex==='e2')btn.classList.add('on-g');
  else btn.classList.add('on-p');
  render();
}

function setSt2(st,btn){
  filterSt=st;
  ['st-all','st-u','st-r','st-m'].forEach(id=>{
    const b=document.getElementById(id);
    b.classList.remove('on','on-r','on-b','on-g');
  });
  if(st==='all')btn.classList.add('on');
  else if(st==='unfamiliar')btn.classList.add('on-r');
  else if(st==='reviewing')btn.classList.add('on');
  else btn.classList.add('on-g');
  render();
}

// wire up status filter buttons
document.getElementById('st-all').onclick=function(){setSt2('all',this);};
document.getElementById('st-u').onclick=function(){setSt2('unfamiliar',this);};
document.getElementById('st-r').onclick=function(){setSt2('reviewing',this);};
document.getElementById('st-m').onclick=function(){setSt2('mastered',this);};

function toggleHerbs(){
  showHerbs=!showHerbs;
  document.getElementById('herb-toggle').textContent=showHerbs?'隱藏藥材':'顯示藥材';
  render();
}

// ============================================================
//  FLASHCARD
// ============================================================
function setFcMode(m,btn){
  fcMode=m;
  document.querySelectorAll('.fcm').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  initFc();
}

function setFcEx(ex,btn){
  fcExam=ex;
  document.querySelectorAll('.fc-range .fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  initFc();
}

function initFc(){
  let pool=fcExam==='all'?[...DATA]:DATA.filter(d=>d.ex===fcExam);
  if(fcMode==='weak'){
    let w=pool.filter(d=>status[d.id]==='unfamiliar');
    if(!w.length)w=pool.filter(d=>status[d.id]!=='mastered');
    if(!w.length)w=[...pool];
    fcQueue=[...w];
  }else{
    fcQueue=[...pool];
  }
  // shuffle
  for(let i=fcQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [fcQueue[i],fcQueue[j]]=[fcQueue[j],fcQueue[i]];
  }
  fcIdx=0;fcFlipped=false;
  renderFc();
}

function renderFc(){
  if(!fcQueue.length){
    document.getElementById('fc-question').textContent='沒有符合方劑';
    document.getElementById('fc-cnt').textContent='0/0';
    return;
  }
  const d=fcQueue[fcIdx];
  document.getElementById('fc-cnt').textContent=`${fcIdx+1}/${fcQueue.length}`;
  document.getElementById('fc-answer').style.display='none';
  document.getElementById('fc-effect').style.display='none';
  document.getElementById('fc-hint').style.display='block';
  fcFlipped=false;
  let label='',q='';
  if(fcMode==='name2effect'||fcMode==='weak'){
    label='方名 → 功效＋證型';q=d.name;
  }else if(fcMode==='mnem2herb'){
    label='口訣 → 藥材組成';q=d.mnem;
  }else if(fcMode==='pattern2name'){
    label='證型 → 方名';q=d.pattern;
  }
  document.getElementById('fc-qlabel').textContent=label;
  document.getElementById('fc-question').textContent=q;
}

function flip(){
  if(!fcQueue.length)return;
  const d=fcQueue[fcIdx];
  fcFlipped=!fcFlipped;
  const ans=document.getElementById('fc-answer');
  const eff=document.getElementById('fc-effect');
  const hint=document.getElementById('fc-hint');
  if(fcFlipped){
    hint.style.display='none';
    if(fcMode==='name2effect'||fcMode==='weak'){
      ans.textContent='功效：'+d.effect;ans.style.display='block';
      eff.textContent='證型：'+d.pattern+'\n口訣：'+d.mnem;eff.style.display='block';
    }else if(fcMode==='mnem2herb'){
      ans.textContent=d.herbs;ans.style.display='block';
      eff.textContent='方名：'+d.name+'　功效：'+d.effect;eff.style.display='block';
    }else if(fcMode==='pattern2name'){
      ans.textContent='▶ '+d.name;ans.style.display='block';
      eff.textContent='功效：'+d.effect+'\n口訣：'+d.mnem;eff.style.display='block';
    }
  }else{
    ans.style.display='none';eff.style.display='none';hint.style.display='block';
  }
}

function nextFc(){if(!fcQueue.length)return;fcIdx=(fcIdx+1)%fcQueue.length;renderFc();}
function prevFc(){if(!fcQueue.length)return;fcIdx=(fcIdx-1+fcQueue.length)%fcQueue.length;renderFc();}
function markFc(st){
  if(!fcQueue.length)return;
  status[fcQueue[fcIdx].id]=st;save();nextFc();
}

// ============================================================
//  STATS
// ============================================================
function renderStats(){
  const tot=DATA.length;
  const m=DATA.filter(d=>status[d.id]==='mastered').length;
  const r=DATA.filter(d=>status[d.id]==='reviewing').length;
  const u=DATA.filter(d=>status[d.id]==='unfamiliar').length;
  const none=tot-m-r-u;
  document.getElementById('stats-grid').innerHTML=`
    <div class="scard"><div class="snum" style="color:var(--gold2)">${tot}</div><div class="slbl">整合總方數</div></div>
    <div class="scard"><div class="snum" style="color:var(--green2)">${m}</div><div class="slbl">已掌握 ${tot?Math.round(m/tot*100):0}%</div></div>
    <div class="scard"><div class="snum" style="color:var(--gold2)">${r}</div><div class="slbl">複習中</div></div>
    <div class="scard"><div class="snum" style="color:var(--red2)">${u}</div><div class="slbl">不熟</div></div>
    <div class="scard"><div class="snum" style="color:var(--muted)">${none}</div><div class="slbl">未標記</div></div>`;
  const batches=[
    {k:'e1',l:'第一批 1–40',col:'var(--gold)'},
    {k:'e2',l:'第二批 41–80',col:'var(--green)'},
    {k:'e3',l:'第三批 81–120',col:'var(--purple)'},
  ];
  document.getElementById('prog-rows').innerHTML=batches.map(b=>{
    const p=DATA.filter(d=>d.ex===b.k);
    const pm=p.filter(d=>status[d.id]==='mastered').length;
    const pct=p.length?Math.round(pm/p.length*100):0;
    return`<div class="prog-row">
      <div class="prog-lbl">${b.l}</div>
      <div class="prog-tr"><div class="prog-fill" style="width:${pct}%;background:${b.col}"></div></div>
      <div class="prog-pct">${pm}/${p.length}</div>
    </div>`;
  }).join('');
}

// ============================================================
//  INIT
// ============================================================
render();
initFc();
</script>
