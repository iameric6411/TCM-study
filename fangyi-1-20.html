function rb(r){return`<span class="rb" data-r="${r}">${r}</span>`;}
function herbRows(h){return h.map(r=>`<tr><td>${rb(r[0])}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');}
function cmpRows(k){return k.map(r=>`<tr><td class="cmp-n">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');}

function render(){
  const q=document.getElementById('main-q').value.toLowerCase();
  const filtered=F.filter((f,i)=>{
    if(!q)return true;
    const idx=START+i;
    return f.n.includes(q)||f.c.includes(q)||f.m.includes(q)||f.a.includes(q)||f.p.includes(q)||f.f.includes(q)||String(idx)===q.trim();
  });
  document.getElementById('rcount').innerHTML=q?`顯示 <span>${filtered.length}</span> / ${F.length} 首`:`共 <span>${F.length}</span> 首`;
  document.getElementById('cards').innerHTML=filtered.map(f=>{
    const i=F.indexOf(f);
    const num=START+i;
    return`<section id="f${num}" class="fang-card">
  <div class="fc-hd">
    <span class="fc-num">#${String(num).padStart(3,'0')}</span>
    <span class="fc-name">${f.n}</span>
    <span class="edot ${EDOT}"></span>
  </div>
  <div class="fc-row"><span class="rl">組成</span><span class="rv">${f.c}</span></div>
  <div class="fc-row"><span class="rl">口訣</span><span class="rv rv-mnem">${f.m}</span></div>
  <div class="tsec">
    <span class="rl">藥物拆解</span>
    <div class="tw"><table class="tbl">
      <thead><tr><th>角色</th><th>藥材</th><th>功效定位</th></tr></thead>
      <tbody>${herbRows(f.h)}</tbody>
    </table></div>
  </div>
  <div class="an-sec">
    <span class="rl">方義分析</span>
    <p class="an-p">${f.a}</p>
  </div>
  <div class="fc-row"><span class="rl">主治</span><span class="rv rv-ptn">${f.p}</span></div>
  <div class="fc-row"><span class="rl">配伍特點</span><span class="rv rv-ftr">${f.f}</span></div>
  <div class="tsec">
    <span class="rl">類方比較</span>
    <div class="tw"><table class="tbl">
      <thead><tr><th>比較方</th><th>共同點</th><th>關鍵差異</th><th>鑑別要點</th></tr></thead>
      <tbody>${cmpRows(f.k)}</tbody>
    </table></div>
  </div>
</section>`;
  }).join('');
  initObs();
}

function buildSidebar(){
  const sb=document.getElementById('sb-list');
  sb.innerHTML=NAMES.map((n,i)=>`<a href="#f${START+i}" class="sb-a" id="sb-${START+i}"><span class="sb-n">${START+i}</span>${n}</a>`).join('');
}
function sbFilter(){
  const q=document.getElementById('sb-q').value.toLowerCase();
  document.querySelectorAll('.sb-a').forEach(a=>{
    a.classList.toggle('hidden',!!q&&!a.textContent.toLowerCase().includes(q));
  });
}

let obs;
function initObs(){
  if(obs)obs.disconnect();
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id;
        document.querySelectorAll('.sb-a').forEach(a=>a.classList.toggle('on',a.getAttribute('href')==='#'+id));
      }
    });
  },{threshold:0.15,rootMargin:'-5% 0px -75% 0px'});
  document.querySelectorAll('.fang-card').forEach(s=>obs.observe(s));
}

buildSidebar();
render();
document.getElementById('main-q').addEventListener('input',render);
</script>
