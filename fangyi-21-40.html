 a:'補血的基礎方。熟地滋陰填精以補血之本，當歸補血活血以暢其流，白芍養血斂陰以固其體，川芎活血行氣以防補而不滯。四藥構成「補血而不滯血、行血而不傷血」的完美格局。動靜結合（熟地白芍靜補＋當歸川芎動行），補中有行，為一切血虛血滯方劑的基礎骨架。',

 p:'陽鬱厥逆／肝脾氣鬱——四肢厥逆（非寒厥）、或脘腹疼痛、或泄利下重、脈弦',
 f:'一升（柴胡）一降（枳實）、一散（柴胡）一收（白芍）',
 k:[['柴胡疏肝湯','柴胡＋白芍疏肝','加川芎、香附、陳皮行氣活血','疏肝湯治肝氣鬱滯脅痛（偏氣滯），四逆散治陽鬱厥逆'],['加味逍遙散','柴胡疏肝','加當歸白朮茯苓薄荷再加丹皮梔子','加味逍遙治肝鬱化火，四逆散偏純氣鬱'],['四逆湯','名稱相似','用附子乾薑回陽救逆','四逆湯治陽虛寒厥（真寒），四逆散治陽鬱假寒']]},

 p:'脾胃氣虛——面色萎白、食少便溏、四肢乏力、語聲低微、舌淡苔白脈虛緩',
 f:'甘溫益氣、補而不峻',

{n:'甘麥大棗湯',c:'小麥、炙甘草、大棗',

 a:'三味精簡卻功力深厚。本方出自《金匱要略》，專治「髒躁」——心陰不足、肝氣失和，表現為精神恍惚、悲傷欲哭、不能自主、呵欠頻作。小麥甘涼，養心陰、安心神、除煩熱。甘草甘緩，補脾益氣、緩急止躁。大棗甘溫，補脾養血安神。三藥皆甘，甘以緩急、甘以養脾、甘以潤燥，合奏養心安神、和中緩急之功。現代常用於神經衰弱、更年期綜合症等。',

{n:'加味逍遙散',c:'丹皮、梔子、柴胡、當歸、白朮、白芍、茯苓、甘草、薄荷、煨薑',

function rb(r){return`<span class="rb" data-r="${r}">${r}</span>`;}
function herbRows(h){return h.map(r=>`<tr><td>${rb(r[0])}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');}
function cmpRows(k){return k.map(r=>`<tr><td class="cmp-n">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');}

function render(){
  const q=document.getElementById('main-q').value.toLowerCase();
  const filtered=F.filter((f,i)=>{
    if(!q)return true;
    return f.n.includes(q)||f.c.includes(q)||f.m.includes(q)||f.a.includes(q)||f.p.includes(q)||f.f.includes(q)||String(START+i)===q.trim();
  });
  document.getElementById('rcount').innerHTML=q?`顯示 <span>${filtered.length}</span> / ${F.length} 首`:`共 <span>${F.length}</span> 首`;
  document.getElementById('cards').innerHTML=filtered.map(f=>{
    const num=START+F.indexOf(f);
    return`<section id="f${num}" class="fang-card">
  <div class="fc-hd">
    <span class="fc-num">#${String(num).padStart(3,'0')}</span>
    <span class="fc-name">${f.n}</span>
    <span class="edot ${EDOT}"></span>
  </div>
  <div class="fc-row"><span class="rl">組成</span><span class="rv">${f.c}</span></div>
  <div class="fc-row"><span class="rl">口訣</span><span class="rv rv-mnem">${f.m}</span></div>
  <div class="tsec"><span class="rl">藥物拆解</span>
    <div class="tw"><table class="tbl"><thead><tr><th>角色</th><th>藥材</th><th>功效定位</th></tr></thead>
    <tbody>${herbRows(f.h)}</tbody></table></div></div>
  <div class="an-sec"><span class="rl">方義分析</span><p class="an-p">${f.a}</p></div>
  <div class="fc-row"><span class="rl">主治</span><span class="rv rv-ptn">${f.p}</span></div>
  <div class="fc-row"><span class="rl">配伍特點</span><span class="rv rv-ftr">${f.f}</span></div>
  <div class="tsec"><span class="rl">類方比較</span>
    <div class="tw"><table class="tbl"><thead><tr><th>比較方</th><th>共同點</th><th>關鍵差異</th><th>鑑別要點</th></tr></thead>
    <tbody>${cmpRows(f.k)}</tbody></table></div></div>
</section>`;
  }).join('');
  initObs();
}

function buildSidebar(){
  document.getElementById('sb-list').innerHTML=NAMES.map((n,i)=>`<a href="#f${START+i}" class="sb-a" id="sb-${START+i}"><span class="sb-n">${START+i}</span>${n}</a>`).join('');
}
function sbFilter(){
  const q=document.getElementById('sb-q').value.toLowerCase();
  document.querySelectorAll('.sb-a').forEach(a=>a.classList.toggle('hidden',!!q&&!a.textContent.toLowerCase().includes(q)));
}
let obs;
function initObs(){
  if(obs)obs.disconnect();
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id;document.querySelectorAll('.sb-a').forEach(a=>a.classList.toggle('on',a.getAttribute('href')==='#'+id));}});
  },{threshold:0.15,rootMargin:'-5% 0px -75% 0px'});
  document.querySelectorAll('.fang-card').forEach(s=>obs.observe(s));
}
buildSidebar();render();
</script>
